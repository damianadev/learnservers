services:

  app:
    image: httpd:latest
    ports:
      - 8000:80
    volumes:
      - ./html:/usr/local/apache2/htdocs

  node:
    build:
      context: .
      dockerfile: dockerfile
    ports: 
    - 3000:3000

  db:
    image: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: example
    volumes:
      - ta25bdbdata:/var/lib/mysql  
    ports:
      - 33061:3306

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  ta25bdbdata:
